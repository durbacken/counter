<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep-blue gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- Three rising bars (bar-chart / counter metaphor) -->
  <rect x="68"  y="316" width="104" height="152" rx="20" fill="white" opacity="0.70"/>
  <rect x="204" y="212" width="104" height="256" rx="20" fill="white" opacity="0.85"/>
  <rect x="340" y="92"  width="104" height="376" rx="20" fill="white"/>

  <!-- Plus sign, top-left — signals "increment" -->
  <rect x="72"  y="108" width="20"  height="80" rx="10" fill="white" opacity="0.60"/>
  <rect x="42"  y="138" width="80"  height="20" rx="10" fill="white" opacity="0.60"/>
</svg>
